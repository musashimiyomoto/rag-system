name: Test Docker Compose

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-docker-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create env file
        run: cp .env.example .env

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d --wait api ui

      - name: Wait for API readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:5000/health/liveness >/dev/null; then
              exit 0
            fi
            echo "API is not ready yet (attempt ${i}/30), waiting..."
            sleep 2
          done
          echo "API did not become ready in time."
          exit 1

      - name: Wait for UI readiness
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8501 >/dev/null; then
              exit 0
            fi
            echo "UI is not ready yet (attempt ${i}/30), waiting..."
            sleep 2
          done
          echo "UI did not become ready in time."
          exit 1

      - name: Show compose status on failure
        if: failure()
        run: docker compose ps

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans
